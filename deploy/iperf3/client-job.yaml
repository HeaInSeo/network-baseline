apiVersion: batch/v1
kind: Job
metadata:
  name: iperf3-client
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: iperf3-client
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: iperf3-client
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 5
      containers:
        - name: iperf3
          image: networkstatic/iperf3:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              iperf3 -J -c "${IPERF3_SERVER_HOST}" -p "${IPERF3_SERVER_PORT}" ${IPERF3_EXTRA_ARGS}
          env:
            - name: IPERF3_SERVER_HOST
              value: iperf3-server
            - name: IPERF3_SERVER_PORT
              value: "5201"
            - name: IPERF3_EXTRA_ARGS
              value: "-t 10"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "1"
              memory: 256Mi

