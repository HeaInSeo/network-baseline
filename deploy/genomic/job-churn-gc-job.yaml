apiVersion: batch/v1
kind: Job
metadata:
  name: job-churn-gc
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: job-churn-gc
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: job-churn-gc
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 5
      containers:
        - name: churn
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              started_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              sleep "${SLEEP_SECONDS}"
              finished_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "startedAt=${started_at}"
              echo "finishedAt=${finished_at}"
              echo "sleepSeconds=${SLEEP_SECONDS}"
              echo "result=pass"
          env:
            - name: SLEEP_SECONDS
              value: "1"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
