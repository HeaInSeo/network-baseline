apiVersion: batch/v1
kind: Job
metadata:
  name: local-reuse-same-node
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: local-reuse-same-node
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: local-reuse-same-node
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 5
      containers:
        - name: local-reuse
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              artifact_dir="/node-local/${ARTIFACT_RELATIVE_DIR}"
              artifact_path="${artifact_dir}/artifact.bin"
              echo "role=${ROLE}"
              echo "artifactPath=${artifact_path}"
              echo "expectedSha256=${EXPECTED_SHA256}"
              echo "expectedSizeBytes=${EXPECTED_SIZE_BYTES}"
              mkdir -p "${artifact_dir}"
              if [ "${ROLE}" = "producer" ]; then
                dd if=/dev/urandom of="${artifact_path}" bs=1024 count="${ARTIFACT_KIB}" 2>/tmp/dd.log
                size_bytes="$(wc -c "${artifact_path}" | awk '{print $1}')"
                sha256="$(sha256sum "${artifact_path}" | awk '{print $1}')"
                echo "sizeBytes=${size_bytes}"
                echo "sha256=${sha256}"
                echo "result=pass"
                exit 0
              fi
              if [ "${ROLE}" = "consumer" ]; then
                if [ ! -f "${artifact_path}" ]; then
                  echo "failureLayer=node_local_path"
                  echo "result=fail"
                  exit 1
                fi
                size_bytes="$(wc -c "${artifact_path}" | awk '{print $1}')"
                sha256="$(sha256sum "${artifact_path}" | awk '{print $1}')"
                digest_verified="false"
                size_verified="false"
                if [ "${EXPECTED_SHA256}" = "${sha256}" ]; then
                  digest_verified="true"
                fi
                if [ "${EXPECTED_SIZE_BYTES}" = "${size_bytes}" ]; then
                  size_verified="true"
                fi
                echo "sizeBytes=${size_bytes}"
                echo "sha256=${sha256}"
                echo "digestVerified=${digest_verified}"
                echo "sizeVerified=${size_verified}"
                if [ "${digest_verified}" = "true" ] && [ "${size_verified}" = "true" ]; then
                  echo "result=pass"
                  exit 0
                fi
                echo "failureLayer=digest"
                echo "result=fail"
                exit 1
              fi
              if [ "${ROLE}" = "cleanup" ]; then
                rm -rf "${artifact_dir}"
                cleanup_observed="false"
                if [ ! -e "${artifact_dir}" ]; then
                  cleanup_observed="true"
                fi
                echo "cleanupObserved=${cleanup_observed}"
                if [ "${cleanup_observed}" = "true" ]; then
                  echo "result=pass"
                  exit 0
                fi
                echo "failureLayer=cleanup"
                echo "result=fail"
                exit 1
              fi
              echo "failureLayer=unknown_role"
              echo "result=fail"
              exit 1
          env:
            - name: ROLE
              value: producer
            - name: ARTIFACT_RELATIVE_DIR
              value: network-baseline-local-reuse/default
            - name: ARTIFACT_KIB
              value: "1024"
            - name: EXPECTED_SHA256
              value: ""
            - name: EXPECTED_SIZE_BYTES
              value: "0"
          volumeMounts:
            - name: node-local
              mountPath: /node-local
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: node-local
          hostPath:
            path: /tmp/network-baseline-local-reuse
            type: DirectoryOrCreate
