apiVersion: batch/v1
kind: Job
metadata:
  name: network-health-dns-service
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: dns-service-check
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: dns-service-check
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 5
      containers:
        - name: check
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              service_short="${SERVICE_NAME}"
              service_fqdn="${SERVICE_NAME}.${TARGET_NAMESPACE}.svc.cluster.local"
              echo "check=namespace value=${TARGET_NAMESPACE}"
              echo "check=service_short value=${service_short}"
              echo "check=service_fqdn value=${service_fqdn}"
              if nslookup "${service_short}"; then
                echo "check=short_name_resolution status=pass"
              else
                echo "check=short_name_resolution status=warn reason=resolver_search_path_returned_nonzero"
              fi
              nslookup "${service_fqdn}"
              nc -vz -w "${CONNECT_TIMEOUT_SECONDS}" "${service_fqdn}" "${SERVICE_PORT}"
              echo "check=result status=pass"
          env:
            - name: TARGET_NAMESPACE
              value: network-baseline
            - name: SERVICE_NAME
              value: iperf3-server
            - name: SERVICE_PORT
              value: "5201"
            - name: CONNECT_TIMEOUT_SECONDS
              value: "5"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
