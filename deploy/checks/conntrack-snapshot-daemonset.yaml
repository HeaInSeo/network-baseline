apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: network-health-conntrack-snapshot
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: conntrack-snapshot
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: network-baseline
      app.kubernetes.io/component: conntrack-snapshot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: conntrack-snapshot
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: snapshot
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              echo "conntrack-snapshot ready"
              sleep 3600
          volumeMounts:
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
