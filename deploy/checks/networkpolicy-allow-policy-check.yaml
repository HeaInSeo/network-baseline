apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: network-baseline-allow-policy-check
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: networkpolicy-check
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: network-baseline
      app.kubernetes.io/component: iperf3-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: network-baseline
              app.kubernetes.io/component: networkpolicy-allow-check
      ports:
        - protocol: TCP
          port: 5201
