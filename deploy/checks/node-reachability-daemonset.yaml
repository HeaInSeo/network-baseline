apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: network-health-node-reachability
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: node-reachability-check
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: network-baseline
      app.kubernetes.io/component: node-reachability-check
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: node-reachability-check
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: check
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              echo "node-reachability ready"
              sleep 3600
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
