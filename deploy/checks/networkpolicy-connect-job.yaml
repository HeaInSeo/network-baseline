apiVersion: batch/v1
kind: Job
metadata:
  name: network-health-networkpolicy-connect
  labels:
    app.kubernetes.io/name: network-baseline
    app.kubernetes.io/component: networkpolicy-check
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-baseline
        app.kubernetes.io/component: networkpolicy-check
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 5
      containers:
        - name: check
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-ceu"]
          args:
            - |
              echo "check=networkpolicy service=${SERVICE_NAME} port=${SERVICE_PORT} expect_connect=${EXPECT_CONNECT}"
              set +e
              nc -vz -w "${CONNECT_TIMEOUT_SECONDS}" "${SERVICE_NAME}" "${SERVICE_PORT}"
              rc="$?"
              set -e
              if [ "${EXPECT_CONNECT}" = "true" ] && [ "${rc}" -eq 0 ]; then
                echo "check=result status=pass reason=connect-allowed"
                exit 0
              fi
              if [ "${EXPECT_CONNECT}" = "false" ] && [ "${rc}" -ne 0 ]; then
                echo "check=result status=pass reason=connect-denied"
                exit 0
              fi
              echo "check=result status=fail reason=unexpected-connectivity rc=${rc}"
              exit 1
          env:
            - name: SERVICE_NAME
              value: iperf3-server
            - name: SERVICE_PORT
              value: "5201"
            - name: CONNECT_TIMEOUT_SECONDS
              value: "5"
            - name: EXPECT_CONNECT
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
