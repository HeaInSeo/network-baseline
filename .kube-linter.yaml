checks:
  doNotAutoAddDefaults: false
  exclude:
    # network-baseline runs short-lived diagnostic workloads, including ICMP
    # checks and host /proc read-only snapshots. Keep these exceptions narrow
    # and revisit them before promoting any workload to a long-lived service.
    - latest-tag
    - no-read-only-root-fs
    - run-as-non-root
    - drop-net-raw-capability
    - host-mounts
    - sensitive-host-mounts
